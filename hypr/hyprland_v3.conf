############################
### CONFIG HYPRLAND EDIT ###
############################

################
### MONITORS ###
################

monitor=,preferred,auto,auto

###################
### MY PROGRAMS ###
###################
exec-once = brightnessctl set 60%

$terminal = kitty
$fileManager = dolphin

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# O execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &

# Mejora: Se añade 'sleep 1' para dar tiempo al sistema y evitar race conditions con Waybar.
# exec-once = waybar # Esto fue Comentado
exec-once = quickshell --config /etc/xdg/quickshell/noctalia-shell

# Mejora: Se cambia 'exec-once = workspace 3 silent, ...' por una regla de ventana 
# y ejecución simple para mayor compatibilidad con Hyprland.
#exec-once = ~/Escritorio/Obsidian-1.8.9.AppImage

# Wallpepers
# exec-once = swww-daemon & # Esto fue Comentado
#exec-once = swww img ~/.config/wallpeper/num1.jpg
# exec-once = ~/.config/hypr/scripts/change_wallpaper.sh # Esto fue Comentado

# Ocultar el cursor automáticamente (al iniciar Hyprland)
exec-once = unclutter --timeout 0
bind = , F6, exec, pkill unclutter || unclutter --timeout 0

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 4
    gaps_out = 10

    border_size = 1

    # Se corrige la sintaxis del color de borde activo para un degradado limpio (0xAARRGGBB)
    # col.active_border = 0xffb89c56 0xffeedd82 45deg
    # col.active_border = 0xff89cff0 0xff6aa0c9 45deg
    # col.active_border = 0xff5f7a8a 0xff4c6473 45deg
    # col.active_border = 0xff5f7a8a 0xff4c6473 45deg
    col.active_border = 0xffd0d7de
    # col.active_border = 0xff3f3f3f
    # Se utiliza 0xAARRGGBB para consistencia
    col.inactive_border = 0xaa595959

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
    no_focus_fallback = true
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    # Mejora: Se habilita un redondeo sutil (8px)
    rounding = 10
    rounding_power = 0 # 3

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    # Sombra desactivada completamente
# shadow {
#     enabled = false  # La sombra está desactivada
#     range = 8        # (Comentado)
#     render_power = 3 # (Comentado)
#     color = rgba(1a1a1a66) # (Comentado)
# }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = false 
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    # Se corrige la sintaxis de 'enabled'
    enabled = yes

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrulev2 = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = rounding 0, floating:0, onworkspace:w[tv1]
# windowrulev2 = bordersize 0, floating:0, onworkspace:f[1]
# windowrulev2 = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers -1
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}

cursor {
    inactive_timeout = 3
    no_hardware_cursors = false
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = latam
    follow_mouse = 1
    sensitivity = 0
    accel_profile = adaptive

    touchpad {
        natural_scroll = false
        tap-to-click = true
        disable_while_typing = false 
    }
}


# https://wiki.hyprland.org/Configuring/Variables/#gestures
# gestures {
#     workspace_swipe = false
# }

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################


# ==========================
#  Configuración de Teclado 
# ==========================
$mod = SUPER
$alt = ALT
$ctrl = CTRL
$shift = SHIFT

# Bajar brillo y Subir brillo
bind = $mod, F11, exec, brightnessctl set 10%-
bind = $mod, F12, exec, brightnessctl set +10%

# ==========================
#  Lanzadores de Aplicaciones
# ==========================
bind = $mod, RETURN, exec, kitty
# bind = $mod, RETURN, exec, ~/.config/hypr/open_tiled_kitty.sh

bind = $mod, B, exec, zen-browser
bind = $mod, N, exec, ~/Escritorio/Obsidian-1.8.9.AppImage
bind = $mod, C, exec, code

# ==========================
#  Administración de Ventanas
# ==========================
# Se mantiene solo un killactive
bind = $mod, W, killactive

bind = $mod, F, fullscreen

bind = $mod $shift, F, togglefloating


# Ejemplo binds, ver https://wiki.hyprland.org/Configuring/Binds/ para más
# bind = $mod, M, exit,
bind = $mod, M, exec, rofi -show drun -theme ~/.config/rofi/launchers/type-1/style-5.rasi
# bind = $mod, E, exec, $fileManager
# bind = $mod, V, togglefloating,
# bind = $mod, R, exec, $menu

# Mejora: Keybinds para la gestión del layout Dwindle
bind = $mod, P, pseudo, # dwindle: Alternar pseudotiling
bind = $mod, J, togglesplit, # dwindle: Alternar división (Master/Slave)

# Cambiar al siguiente layout
bind = $mod, TAB,  fullscreen, 1
bind = $mod, D, exec, hyprctl dispatch togglefloating

# ==========================
#  Gestión de Wallpapers
# ==========================
# Añade un atajo, por ejemplo, Mod + G para generar nuevo wallpaper (G de Generate/Generar)
# bind = $mod, G, exec, ~/.config/hypr/scripts/change_wallpaper.sh

# ==========================
#  Navegación entre Ventanas
# ==========================
bind = $mod, LEFT, movefocus, l
bind = $mod, DOWN, movefocus, d
bind = $mod, UP, movefocus, u
bind = $mod, RIGHT, movefocus, r

bind = $mod, L, movefocus, l
bind = $mod, K, movefocus, d
bind = $mod, I, movefocus, u
bind = $mod, J, movefocus, r

bind = SUPER_SHIFT, left, movewindow, l
bind = SUPER_SHIFT, right, movewindow, r
bind = SUPER_SHIFT, up, movewindow, u
bind = SUPER_SHIFT, down, movewindow, d

bind = $mod ,SPACE, cyclenext, prev

# ==========================
#  workspaces
# ==========================
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5


# ==========================
#  REGLAS DE WORKSPACE INICIAL
# ==========================
workspace = 1, monitor:eDP-1
workspace = 2, monitor:eDP-1
workspace = 3, monitor:eDP-1
# workspace = 3, monitor:eDP-1, default:true
workspace = 4, monitor:eDP-1
workspace = 5, monitor:eDP-1

# Example special workspace (scratchpad)
bind = $mod, S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mod + scroll
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move/resize windows with mod + LMB/RMB and dragging
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


# Reglas de inicio de app 
windowrulev2 = workspace 3, class:^(obsidian|Obsidian)$
windowrulev2 = fullscreen, class:^(Obsidian)$
windowrulev2 = workspace 1, class:^(zen-browser)$
windowrule = opacity 0.9 0.9, title:(kitty)
windowrulev2 = suppressevent maximize, class:.*
