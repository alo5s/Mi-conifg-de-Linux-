############################
### CONFIG HYPRLAND EDIT ###
############################

################
### MONITORS ###
################
# exec-once = elephant
# exec-once = walker --gapplication-service



# monitor=eDP-1,preferred,1366x768,auto
monitor=,preferred,auto,auto


###################
### MY PROGRAMS ###
###################
$terminal = kitty
$fileManager = dolphin

#################
### AUTOSTART ###
#################
exec-once = brightnessctl set 60%
#exec-once = quickshell --config /etc/xdg/quickshell/noctalia-shell
exec-once = bash ~/.config/ags/start.sh
exec-once = unclutter --timeout 0
bind = , F6, exec, pkill unclutter || unclutter --timeout 0

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 4
    gaps_out = 10
    border_size = 1
    col.active_border = 0xffd0d7de
    col.inactive_border = 0xaa595959
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
    no_focus_fallback = true

    resize_on_border = true
    extend_border_grab_area = 10
}

decoration {
    rounding = 10
    rounding_power = 0
    active_opacity = 1.0
    inactive_opacity = 1.0
    blur {
        # enabled = false
        enabled = true
        size = 8
        passes = 3
    }
}

animations {
    enabled = yes
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1
    animation = global,1,10,default
    animation = border,1,5.39,easeOutQuint
    animation = windows,1,4.79,easeOutQuint
    animation = windowsIn,1,4.1,easeOutQuint,popin 87%
    animation = windowsOut,1,1.49,linear,popin 87%
    animation = fadeIn,1,1.73,almostLinear
    animation = fadeOut,1,1.46,almostLinear
    animation = fade,1,3.03,quick
    animation = layers,1,3.81,easeOutQuint
    animation = layersIn,1,4,easeOutQuint,fade
    animation = layersOut,1,1.5,linear,fade
    animation = fadeLayersIn,1,1.79,almostLinear
    animation = fadeLayersOut,1,1.39,almostLinear
    animation = workspaces,1,1.94,almostLinear,fade
    animation = workspacesIn,1,1.21,almostLinear,fade
    animation = workspacesOut,1,1.94,almostLinear,fade
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

cursor {
    inactive_timeout = 3
    no_hardware_cursors = false
}

input {
    kb_layout = latam
    follow_mouse = 1
    sensitivity = 0
    accel_profile = adaptive
    touchpad {
        natural_scroll = false
        tap-to-click = true
        disable_while_typing = false
    }
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

###################
### KEYBINDINGS ###
###################
$mod = SUPER
$alt = ALT
$ctrl = CTRL
$shift = SHIFT



# Brillo
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Volumen
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Foto caputura 
bind = $mod $shift, S, exec, flameshot gui

# Lanzadores
bind = $mod, RETURN, exec, kitty
bind = $mod, B, exec, zen-browser
bind = $mod, N, exec, ~/Escritorio/Obsidian-1.8.9.AppImage
bind = $mod, C, exec, code
#bind = $mod, M, exec, rofi -show drun -theme ~/.config/rofi/launchers/type-1/style-5.rasi
bind = $mod, M, exec, bash ~/.config/ags/toggle-launcher.sh


# Ventanas
bind = $mod, W, killactive
bind = $mod, F, fullscreen
bind = $mod $shift, F, togglefloating

# Dwindle
bind = $mod, P, pseudo
bind = $mod, J, togglesplit
bind = $mod, TAB, fullscreen, 1
bind = $mod, D, exec, hyprctl dispatch togglefloating

# Navegación
bind = $mod, LEFT, movefocus, l
bind = $mod, DOWN, movefocus, d
bind = $mod, UP, movefocus, u
bind = $mod, RIGHT, movefocus, r
bind = SUPER_SHIFT, left, movewindow, l
bind = SUPER_SHIFT, right, movewindow, r
bind = SUPER_SHIFT, up, movewindow, u
bind = SUPER_SHIFT, down, movewindow, d
bind = $mod ,SPACE, cyclenext, prev

# Scroll through existing workspaces with mod + scroll
# bind = $mod, mouse_down, workspace, e+1
# bind = $mod, mouse_up, workspace, e-1

# Move/resize windows with mod + LMB/RMB and dragging
bindm = $mod, mouse:272, movewindow
# bindm = $mod, mouse:273, resizewindow

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Reglas de inicio de apps
# windowrulev2 = workspace 3, class:^(obsidian|Obsidian)$
# windowrulev2 = fullscreen, class:^(Obsidian)$
# windowrulev2 = workspace 1, class:^(zen-browser)$
# windowrule = opacity 0.9 0.9, title:(kitty)
# windowrulev2 = suppressevent maximize, class:.*

# Flameshot siempre flotante y al frente
# windowrulev2 = float, class:^(flameshot)$

# # Todo flotante por defecto
# windowrulev2 = float, class:.*
#
# # Apps que NO deben flotar
# windowrulev2 = tile, class:^(kitty)$
# windowrulev2 = tile, class:^(zen-browser)$
# windowrulev2 = tile, class:^(code|code-oss|Code)$



###### 
# Mover ventana con SUPER + click izquierdo
bindm = SUPER, mouse:272, movewindow

# Redimensionar con SUPER + click derecho
bindm = SUPER, mouse:273, resizewindow

source = ~/.config/hypr/webapps.conf
