########################################
# Kitty Configuration
# ~/.config/kitty/kitty.conf
########################################

# =====================================================
# 🎨 TEMAS
# =====================================================

include dark-theme.auto.conf

# =====================================================
# 🎨 COLORES
# =====================================================

# selection_background  #283457
# selection_foreground  #c0caf5
selection_background  #565f89
selection_foreground  #ffffff

color0   #15161e
color1   #f7768e
color2   #9ece6a
color3   #e0af68
color4   #7aa2f7
color5   #bb9af7
color6   #7dcfff
color7   #a9b1d6
color8   #414868
color9   #f7768e
color10  #9ece6a
color11  #e0af68
color12  #7aa2f7
color13  #bb9af7
color14  #7dcfff
color15  #c0caf5

# =====================================================
# 🔤 FUENTE
# =====================================================

# font_family                  JetBrainsMono Nerd Font
# font_family                  CaskaydiaCove Nerd Font
font_family                  GeistMono Nerd Font
bold_font                    auto
italic_font                  auto
bold_italic_font             auto

font_size                    11.5

disable_ligatures            never

adjust_line_height           1
adjust_column_width          0

modify_font underline_position 1
modify_font underline_thickness 150%

placement_strategy           top-left

# =====================================================
# 😀 EMOJIS / ICONS
# =====================================================

symbol_map U+E000-U+F8FF Symbols Nerd Font
symbol_map U+1F000-U+1FFFF Noto Color Emoji

# =====================================================
# 🖱 CURSOR
# =====================================================

cursor_shape                         beam
cursor_beam_thickness                1.5
cursor_underline_thickness           2.0

cursor_unfocused_shape       hidden

cursor_blink_interval                0.5
cursor_stop_blinking_after           10

cursor_trail                         1
cursor_trail_decay                   0.1 0.4
cursor_trail_start_threshold         2

shell_integration                    enabled no-cursor


# =====================================================
# 🪟 VENTANA
# =====================================================

hide_window_decorations              yes

window_padding_width                 10
window_margin_width                  0

window_border_width                  1pt

draw_minimal_borders                 yes

active_border_color                  #7aa2f7
inactive_border_color                #414868

remember_window_size                 yes
initial_window_width                 120c
initial_window_height                35c

background_opacity                   0.90
dynamic_background_opacity           yes

confirm_os_window_close              0

inactive_text_alpha                  0.80
dim_opacity                          0.65

# Wayland
linux_display_server                 wayland
enable_wayland                       yes

wayland_titlebar_color               background

# =====================================================
# 📑 TABS
# =====================================================

tab_bar_style                        powerline
tab_powerline_style                  angled

tab_bar_edge                         top
tab_bar_min_tabs                     2

tab_bar_margin_height                0 0
tab_bar_margin_width                 1.0

active_tab_foreground                #1a1b26
active_tab_background                #7aa2f7

inactive_tab_foreground              #a9b1d6
inactive_tab_background              #24283b

tab_separator                        " ┇ "
tab_activity_symbol                  " "

# =====================================================
# 📜 SCROLLBACK
# =====================================================

scrollback_lines                     100000

scrollback_pager                     less --RAW-CONTROL-CHARS -SR

wheel_scroll_multiplier              5
touch_scroll_multiplier              6

# =====================================================
# 🖱 MOUSE
# =====================================================

mouse_hide_wait                      2.0

select_by_word_characters            @-./_~?&=%+#

# =====================================================
# 📋 CLIPBOARD
# =====================================================

copy_on_select                       no

clipboard_control                    write-clipboard write-primary read-clipboard read-primary

allow_remote_control                 yes

# =====================================================
# ⌨️ ATAJOS
# =====================================================

# Clipboard
map ctrl+shift+c combine : copy_to_clipboard : launch --type=background notify-send "󰅍 Copiado" "Texto copiado al portapapeles" -t 5000

map ctrl+shift+v combine : paste_from_clipboard : launch --type=background notify-send "󰆒 Pegado" "Texto pegado" -t 5000

map ctrl+v                           paste_from_clipboard

# Enter estilo terminal moderna
map shift+enter                      send_text all \x0d

# Tamaño fuente
map ctrl+plus                        increase_font_size
map ctrl+minus                       decrease_font_size
map ctrl+0                           reset_font_size

# Scroll
map shift+up                         scroll_line_up
map shift+down                       scroll_line_down

# Layouts
map ctrl+shift+f                     next_layout

# Hints
map ctrl+shift+o                     kitten hints
map ctrl+shift+p                     kitten hints --type path
map ctrl+shift+u                     kitten hints --type url

# =====================================================
# 📐 LAYOUTS
# =====================================================

enabled_layouts                      tall,stack,grid

# =====================================================
# 🌐 URLS
# =====================================================

detect_urls                          yes
url_style                            curly

open_url_with                        default

# =====================================================
# 🔔 SONIDO
# =====================================================

enable_audio_bell                    no
visual_bell_duration                 0

bell_on_tab                          no

# =====================================================
# ⚡ RENDIMIENTO
# =====================================================

repaint_delay                        3
input_delay                          0

sync_to_monitor                      yes

resize_draw_strategy                 scale

visual_window_select_characters      1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ

# =====================================================
# 🧠 CALIDAD DE VIDA
# =====================================================

strip_trailing_spaces                smart

editor                               nvim

shell                                .

# =====================================================
# 🐚 SHELL
# =====================================================

term                                 xterm-kitty

# Mejor compatibilidad true color
env TERM=xterm-256color

# =====================================================
# 🧩 SSH / UPDATE
# =====================================================

update_check_interval                0
