########################################
# Kitty Configuration
# ~/.config/kitty/kitty.conf
########################################

# =====================================================
# 🎨 Colores - Tokyo Night
# =====================================================
background            #1a1b26
foreground            #c0caf5
cursor                #c0caf5
cursor_text_color     #1a1b26

selection_background  #283457
selection_foreground  #c0caf5

color0   #15161e
color1   #f7768e
color2   #9ece6a
color3   #e0af68
color4   #7aa2f7
color5   #bb9af7
color6   #7dcfff
color7   #a9b1d6
color8   #414868
color9   #f7768e
color10  #9ece6a
color11  #e0af68
color12  #7aa2f7
color13  #bb9af7
color14  #7dcfff
color15  #c0caf5

# =====================================================
# 🔤 Fuente
# =====================================================
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
font_size        11
disable_ligatures never

# =====================================================
# 😀 Símbolos Nerd + Emojis
# =====================================================
symbol_map U+E000-U+F8FF Symbols Nerd Font
symbol_map U+1F000-U+1FFFF Noto Color Emoji

# =====================================================
# 🖱 Cursor
# =====================================================
cursor_shape              block
cursor_blink_interval     0.6
cursor_stop_blinking_after 15
cursor_hide_when_typing   yes

# =====================================================
# 🪟 Ventana
# =====================================================
hide_window_decorations   yes
window_padding_width      10
window_border_width       1pt
draw_minimal_borders      yes

# =====================================================
# 📑 Tabs
# =====================================================
tab_bar_style             powerline
tab_powerline_style       angled
active_tab_foreground     #1a1b26
active_tab_background     #7aa2f7
inactive_tab_foreground   #545c7e
inactive_tab_background   #1a1b26

# =====================================================
# 📜 Scrollback
# =====================================================
scrollback_lines          20000
scrollback_pager          less --RAW-CONTROL-CHARS -S -R
wheel_scroll_multiplier   3

# =====================================================
# 🖱 Mouse
# =====================================================
mouse_hide_wait           2.0
select_by_word_characters @-./_~?&=%+#

# =====================================================
# 📋 Clipboard
# =====================================================
copy_on_select            no
clipboard_control         write-clipboard write-primary
allow_remote_control      yes

# =====================================================
# ⌨️ Keymaps
# =====================================================
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+v       paste_from_clipboard
map shift+enter  send_text all \e\r

# =====================================================
# 🌐 URLs
# =====================================================
detect_urls               yes
url_style                 underline
open_url_modifiers        ctrl

# =====================================================
# 🔔 Sonido
# =====================================================
enable_audio_bell         no
bell_on_tab               ""

# =====================================================
# ⚡ Rendimiento
# =====================================================
repaint_delay             5
input_delay               1
sync_to_monitor           yes
