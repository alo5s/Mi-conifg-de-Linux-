########################################
# Kitty Configuration - Paper Theme Pro
# ~/.config/kitty/kitty.conf
########################################

# =====================================================
# 🎨 Tema papel / hoja
# =====================================================
include dark-theme.auto.conf

# background #1E1C1A
# foreground #E6DCC8
# cursor     #C8BCA6
#
# color0  #1E1C1A
# color1  #D17A6A
# color2  #8FAF9A
# color3  #E2C98B
# color4  #9AAAD1
# color5  #B48EAD
# color6  #8FBFBF
# color7  #E6DCC8

background_opacity 0.98

# =====================================================
# 🔤 Fuente
# =====================================================
# font_family FiraCode Nerd Font Mono
font_family FiraCode Nerd Font
font_size 11
disable_ligatures never

# =====================================================
# 😀 Símbolos Nerd + Emojis (FIX REAL)
# =====================================================
# Nerd Fonts Icons (PUA)
symbol_map U+E000-U+F8FF Symbols Nerd Font
# Unicode Emojis
symbol_map U+1F000-U+1FFFF Noto Color Emoji

# =====================================================
# 🖱 Cursor
# =====================================================
cursor_shape block
cursor_color #5C4033
cursor_blink_interval 0.6
cursor_stop_blinking_after 15
cursor_hide_when_typing yes
inactive_cursor_color #A0896D

# =====================================================
# 🪟 Ventana / estética
# =====================================================
hide_window_decorations yes
window_padding_width 9
padding_width 8
padding_height 4

window_border_width 2
window_border_color #D6C3A3

# =====================================================
# 📜 Scrollback
# =====================================================
scrollback_lines 20000
scrollback_pager less --RAW-CONTROL-CHARS -S -R
wheel_scroll_multiplier 1

# =====================================================
# 🖱 Mouse
# =====================================================
mouse_hide_wait 0
select_by_word_characters @-./_~?&=%+#a

# =====================================================
# 📋 Clipboard
# =====================================================
copy_on_select no
enable_kitty_clipboard yes
clipboard_control write-clipboard write-primary
allow_remote_control yes

# =====================================================
# ⌨️ Keymaps
# =====================================================
map ctrl+shift+c copy_to_clipboard 
map ctrl+shift+v paste_from_clipboardd
# map ctrl+c copy_to_clipboard 
map ctrl+v paste_from_clipboard

# =====================================================
# 🖼 Imágenes
# =====================================================
enable_images yes

# =====================================================
# 🔔 Sonido
# =====================================================
enable_audio_bell no
bell_on_tab ""

# =====================================================
# 🌐 URLs
# =====================================================
detect_urls yes
# url_color #6A7BA2
url_style underline
open_url_modifiers ctrl

# =====================================================
# 📑 Tabs estilo papel
# =====================================================
tab_bar_style powerline
tab_powerline_style angled
# active_tab_foreground #3A2F2A
# active_tab_background #E8DDC5
# inactive_tab_foreground #7A6A5A
# inactive_tab_background #F1E7D0

# =====================================================
# ⚡ Rendimiento
# =====================================================
repaint_delay 5
input_delay 1
sync_to_monitor yes

# =====================================================
# 🧠 Extra
# =====================================================
map shift+enter send_text all \e\r



# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME